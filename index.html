<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium meni</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="flags">
    <img src="images/ba.png" onclick="setLang('ba')">
    <img src="images/en.png" onclick="setLang('en')">
    <img src="images/de.png" onclick="setLang('de')">
</div>

<div class="container">

    <div class="logo">
    <img src="images/logo.jpg" alt="Logo">
    </div>

    <h1 class="title" data-key="title">Gold Cafe</h1>
    <p class="subtitle" data-key="subtitle">Premium ponuda • Kvalitet • Ambijent</p>

    <div class="highlight" data-key="highlight">
        Happy Hour 08:00 – 11:00 <br><strong>Kafa 1 KM</strong>
    </div>

    <div class="menu-section">
    <h2 data-key="hot">Topli napici</h2>

    <div class="item" data-price="2" onclick="openItem('espresso')">
        <img src="images/espresso.jpg">
        <div class="info">
            <span data-key="espresso">Espresso</span>
            <span class="price">2 KM</span>
        </div>
        <div class="controls" onclick="event.stopPropagation()">
            <button onclick="changeQty(this,-1)">-</button>
            <span class="qty">0</span>
            <button onclick="changeQty(this,1)">+</button>
        </div>
    </div>

    <div class="item" data-price="3" onclick="openItem('cappuccino')">
        <img src="images/cappuccino.jpg">
        <div class="info">
            <span data-key="cappuccino">Cappuccino</span>
            <span class="price">3 KM</span>
        </div>
        <div class="controls" onclick="event.stopPropagation()">
            <button onclick="changeQty(this,-1)">-</button>
            <span class="qty">0</span>
            <button onclick="changeQty(this,1)">+</button>
        </div>
    </div>

    <div class="item" data-price="3.5" onclick="openItem('latte')">
        <img src="images/latte.jpg">
        <div class="info">
            <span data-key="latte">Latte</span>
            <span class="price">3.5 KM</span>
        </div>
        <div class="controls" onclick="event.stopPropagation()">
            <button onclick="changeQty(this,-1)">-</button>
            <span class="qty">0</span>
            <button onclick="changeQty(this,1)">+</button>
        </div>
    </div>
</div>

<div class="menu-section">
    <h2>Sokovi</h2>

    <div class="item" data-price="3" onclick="openItem('orange')">
        <img src="images/orange.jpg">
        <div class="info">
            <span data-key="orange">Sok od narandže</span>
            <span class="price">3 KM</span>
        </div>
        <div class="controls" onclick="event.stopPropagation()">
            <button onclick="changeQty(this,-1)">-</button>
            <span class="qty">0</span>
            <button onclick="changeQty(this,1)">+</button>
        </div>
    </div>

    <div class="item" data-price="3" onclick="openItem('apple')">
        <img src="images/apple.jpg">
        <div class="info">
            <span data-key="apple">Sok od jabuke</span>
            <span class="price">3 KM</span>
        </div>
        <div class="controls" onclick="event.stopPropagation()">
            <button onclick="changeQty(this,-1)">-</button>
            <span class="qty">0</span>
            <button onclick="changeQty(this,1)">+</button>
        </div>
    </div>
</div>

<div class="menu-section">
    <h2>Deserti</h2>

    <div class="item" data-price="5" onclick="openItem('cake')">
        <img src="images/cake.jpg">
        <div class="info">
            <span data-key="cake">Čokoladna torta</span>
            <span class="price">5 KM</span>
        </div>
        <div class="controls" onclick="event.stopPropagation()">
            <button onclick="changeQty(this,-1)">-</button>
            <span class="qty">0</span>
            <button onclick="changeQty(this,1)">+</button>
        </div>
    </div>

    <div class="item" data-price="5.5" onclick="openItem('cheesecake')">
        <img src="images/cheesecake.jpg">
        <div class="info">
            <span data-key="cheesecake">Cheesecake</span>
            <span class="price">5.5 KM</span>
        </div>
        <div class="controls" onclick="event.stopPropagation()">
            <button onclick="changeQty(this,-1)">-</button>
            <span class="qty">0</span>
            <button onclick="changeQty(this,1)">+</button>
        </div>
    </div>
</div>

    <div class="total-bar">
    <span><span data-key="total">Ukupno:</span> <span id="totalPrice">0</span> KM</span>
</div>

</div>

<!-- MODAL -->
<div id="itemModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeItem()">&times;</span>
        <img id="itemImg">
        <h3 id="itemTitle"></h3>
        <p id="itemDesc"></p>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
